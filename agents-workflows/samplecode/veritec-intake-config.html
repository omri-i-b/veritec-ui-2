  return h('span',{className:`inline-flex items-center gap-1 rounded-md border px-1.5 py-0 text-[10px] font-medium ${TAG[color]||TAG.zinc}`},

}
function Toggle({ checked,onChange,sm }) {

  return h('button',{role:'switch','aria-checked':checked,onClick:()=>onChange(!checked),
    className:`relative inline-flex shrink-0 ${w} rounded-full transition-colors ${checked?'bg-blue-700':'bg-zinc-200'}`},
    h('span',{className:`absolute ${tb} ${tx} rounded-full bg-white shadow-sm transition-transform`}));
}
function Btn({ onClick,variant='outline',size='md',disabled,children,className='' }) {

  const v={primary:'bg-blue-800 hover:bg-blue-900 text-white border border-blue-800',
    outline:'bg-white hover:bg-zinc-50 text-zinc-800 border border-gray-200',
    ghost:'bg-transparent hover:bg-zinc-100 text-zinc-700 border-0',
    danger:'bg-rose-600 hover:bg-rose-700 text-white border border-rose-600'};
  return h('button',{onClick,disabled,className:`inline-flex items-center justify-center gap-1.5 font-medium transition-colors rounded-md ${sz} ${v[variant]||v.outline} disabled:opacity-40 ${className}`},children);
}
function Input({ value,onChange,placeholder,type='text',className='' }) {

}
function FSel({ value,onChange,options,className='' }) {

function getRunDetail(run, agentId){
  const def=AGENT_BY_ID[agentId];
  const runId='run_'+(run.id+'XXXXX').slice(1,6).toUpperCase();

  /* Voice Intake — rich extraction outputs with transcript sources */
  if(agentId==='voice-intake'&&run.case==='CVSA-1389'){
    const T=(timestamp,question,answer)=>({type:'transcript',timestamp,question,answer,callId:'call_'+run.id});
    return {
      runId,
      outputs:[
        {label:'CLIENT REACHED',value:'Yes',confidence:100,source:T('00:08',"Hi, this is Alex from Veritec Law. Am I speaking with Maria Lopez?","Yes, this is Maria.")},
        {label:'CALLER NAME',value:'Maria Lopez',phi:true,confidence:100,source:T('00:18',"Could you confirm your full name for the file?","Maria Elena Lopez.")},
        {label:'MATTER TYPE',value:'Motor vehicle accident',confidence:98,source:T('00:34',"What happened — can you walk me through it?","I was rear-ended on the 101 about a month ago. The other driver was on his phone.")},
        {label:'INCIDENT DATE',value:'March 12, 2025',confidence:96,source:T('00:48',"Do you remember the exact date?","March 12th. I won't forget it.")},
        {label:'INJURY REPORTED',value:'Whiplash, left shoulder pain',phi:true,confidence:94,source:T('01:12',"Were you injured in the accident?","My neck and my left shoulder. The shoulder is the worst — I can barely lift my arm.")},
        {label:'PROVIDER',value:'Dr. Han — SF Sports Medicine',phi:true,confidence:97,source:T('01:34',"Have you been treated by a doctor?","Yes, I've been seeing Dr. Han at SF Sports Medicine, twice a week.")},
        {label:'TREATMENT CADENCE',value:'Tue + Thu, weekly',phi:true,confidence:96,source:T('01:42',"How often are you going in?","Tuesdays and Thursdays. Started the week after the accident.")},
        {label:'SYMPTOM TRAJECTORY',value:'Improving slowly; ROM still limited',phi:true,confidence:91,source:T('02:04',"How is it feeling now?","Better than it was, but my range of motion isn't what it used to be. Dr. Han says it'll take a while.")},
        {label:'ALREADY REPRESENTED',value:'No',confidence:100,source:T('02:48',"Are you working with any other attorney on this?","No — you're the first firm I've called.")},
        {label:'CONSULT BOOKED',value:'Mon Apr 14 at 10:00 AM',confidence:100,source:T('14:22',"I have Monday at 10am or Tuesday at 2pm. Which works for you?","Monday at 10 is great.")},
      ],
      inputs:[
        {label:'CASE',value:run.case,icon:'Doc'},
        {label:'CALL DURATION',value:'18 min',icon:'Clock'},
        {label:'CALLER PHONE',value:'+1 (424) 555-0100',icon:'Phone'},
      ],
      steps:[
        {label:'Stream caller audio',duration:'1.0s',status:'success'},
        {label:'Transcribe + extract fields',duration:'1.2s',status:'success'},
        {label:'CRM conflict + SOL check',duration:'1.0s',status:'success'},
      ],
    };
  }

  /* Depo Prep — full visual fidelity for CVSA-1189 */
  if(agentId==='depo-prep'&&run.case==='CVSA-1189'){
    const C=(field,excerpt)=>({type:'case_file',field,excerpt,document:'CVSA-1189 case file'});
    return {
      runId,
      outputs:[
        {label:'DEPONENT NAME',value:'Maria Lopez',phi:true,confidence:100,source:C('Plaintiff','Plaintiff: Maria Elena Lopez (DOB 1991-04-22), residing at 1244 Mariposa St, San Francisco, CA.')},
        {label:'DEPONENT TYPE',value:'Plaintiff',confidence:100,source:C('Case role','Maria Lopez is named as the plaintiff in CVSA-1189, filed 2025-03-22 in San Francisco Superior Court.')},
        {label:'QUESTION COUNT',value:'127',confidence:null,source:null},
      ],
      questions:[
        {n:1,text:"Ms. Lopez, when you spoke to Officer Martinez at the scene, do you recall telling him you were looking for your phone?",flag:'contradiction'},
        {n:2,text:"In your interrogatory responses, you stated you were not using your phone at the time of impact. Is that accurate?",flag:'contradiction'},
        {n:3,text:"Can you explain the difference between what you told the officer and what you stated in your interrogatories?",flag:'contradiction'},
        {n:4,text:"At approximately what speed were you traveling just before the collision?",flag:'discrepancy'},
        {n:5,text:"Were you cited at the scene? And do you know what the citation was for?",flag:'liability'},
        {n:6,text:"When did you first seek medical treatment after the accident?",flag:'medical'},
        {n:7,text:"Why didn't you seek medical attention for four months after the accident?",flag:'medical'},
        {n:8,text:"Did you take any photographs at the scene of the accident?",flag:'evidence'},
        {n:9,text:"Ms. Lopez, what is your educational background?",flag:'standard'},
        {n:10,text:"Have you ever been involved in any other motor vehicle accidents?",flag:'standard'},
        {n:11,text:"Have you ever been convicted of a crime?",flag:'standard'},
        {n:12,text:"Is the $45,000 future medical cost estimate based on you returning to full-time work?",flag:'damages'},
      ],
      inputs:[
        {label:'CASE',value:run.case,icon:'Doc'},
        {label:'DEPOSITION SAMPLES',value:'Plaintiff Depositions (23 files)',icon:'Layers'},
        {label:'DEPONENT TYPE',value:'Plaintiff',icon:'T'},
      ],
      steps:[
        {label:'Load case context',duration:'1.2s',status:'success'},
        {label:'Retrieve depo samples',duration:'0.8s',status:'success'},
        {label:'Find weaknesses & generate questions',duration:'16.2s',status:'success'},
      ],
    };
  }

  /* Generic detail — derived from run.output.meta */
  const outputs=(run.output?.meta||[]).map(([k,v])=>({label:k,value:v,type:/^[\d$%]/.test(v)?'number':'text'}));
  if(run.output?.type==='doc') outputs.unshift({label:'Document',value:run.output.name,type:'doc'});
  const stepsByAgent={
    'demand-letter':[{label:'Load case + medical chronology',duration:'2.4s',status:'success'},{label:'Calculate multiplier & damages',duration:'4.1s',status:'success'},{label:'Draft demand letter',duration:'31.6s',status:'success'},{label:'Apply firm formatting',duration:'4.0s',status:'success'}],
    'medchron':[{label:'Parse uploaded records',duration:'3.2s',status:'success'},{label:'Build provider timeline',duration:'8.4s',status:'success'},{label:'Detect treatment gaps',duration:'6.6s',status:'success'}],
    'voice-intake':[{label:'Stream caller audio',duration:'1.0s',status:'success'},{label:'Transcribe + extract',duration:'1.2s',status:'success'},{label:'CRM conflict + SOL check',duration:'1.0s',status:'success'}],
    'discovery-response':[{label:'Load case file',duration:'2.1s',status:'success'},{label:'Match attorney objection KB',duration:'4.6s',status:'success'},{label:'Draft responses',duration:'11.1s',status:'success'}],
    'depo-prep':[{label:'Load case context',duration:'1.2s',status:'success'},{label:'Retrieve depo samples',duration:'0.8s',status:'success'},{label:'Find weaknesses & generate questions',duration:'16.2s',status:'success'}],
    'sol-monitor':[{label:'Pull active matter list',duration:'18.2s',status:'success'},{label:'Compute days to SOL',duration:'42.0s',status:'success'},{label:'Trigger alerts + email recap',duration:'1m 14s',status:'success'}],
  };
  return {
    runId,
    outputs,
    inputs:[{label:'CASE',value:run.case,icon:'Doc'}].concat(
      def&&def.isVoice?[{label:'AGENT',value:def.label+' Agent',icon:'Bot'}]:[]),
    steps:stepsByAgent[agentId]||[{label:'Run agent',duration:run.duration||'—',status:run.status==='failed'?'failed':'success'}],
  };
}

              h('span',{className:`shrink-0 mt-1 w-3 h-3 rounded-full flex items-center justify-center ${s.status==='failed'?'bg-rose-100 text-rose-600':'bg-emerald-100 text-emerald-600'}`},
                h('svg',{viewBox:'0 0 24 24',className:'h-2 w-2',fill:'none',stroke:'currentColor',strokeWidth:3,strokeLinecap:'round',strokeLinejoin:'round'},
                  h('path',{d:s.status==='failed'?'M18 6 6 18M6 6l12 12':'M20 6 9 17l-5-5'}))),
              h('span',{className:'flex-1 text-xs text-zinc-700 leading-tight'},s.label),
              h('span',{className:'text-[10px] text-zinc-400 tabular-nums shrink-0'},s.duration))))))),
    sourceOpen&&h(SourceModal,{output:sourceOpen,onClose:()=>setSourceOpen(null)}));
}

function RunsTab({ agentId }){
  const runs=AGENT_RUNS[agentId]||[];
  const [search,setSearch]=useState('');
  const [range,setRange]=useState('24h');
  const [selectedRunId,setSelectedRunId]=useState(null);
  const selectedRun=runs.find(r=>r.id===selectedRunId);
  if(selectedRun){
    return h(RunDetailPage,{run:selectedRun,agentId,onBack:()=>setSelectedRunId(null)});
  }
  const filtered=runs.filter(r=>!search||r.case.toLowerCase().includes(search.toLowerCase()));
  return h('div',null,
    h('div',{className:'flex items-center gap-2 mb-3'},
      h('div',{className:'relative max-w-xs flex-1'},
        h('input',{value:search,onChange:e=>setSearch(e.target.value),placeholder:'Search by case, run ID…',
          className:'w-full h-8 rounded-md border border-gray-200 pl-8 pr-3 text-xs outline-none focus:border-blue-400'}),
        h('svg',{viewBox:'0 0 24 24',className:'absolute left-2.5 top-2 h-3.5 w-3.5 text-zinc-400 pointer-events-none',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
          h('circle',{cx:11,cy:11,r:8}),h('path',{d:'m21 21-4.3-4.3'}))),
      h('select',{value:range,onChange:e=>setRange(e.target.value),
        className:'h-8 rounded-md border border-gray-200 px-2 text-xs bg-white outline-none'},
        [{v:'24h',l:'Last 24 hours'},{v:'7d',l:'Last 7 days'},{v:'30d',l:'Last 30 days'},{v:'all',l:'All time'}].map(o=>h('option',{key:o.v,value:o.v},o.l))),
      h('div',{className:'flex-1'}),
      h(Btn,{variant:'primary',size:'sm'},h(IC.Plus),'New run')),
    h('div',{className:'rounded-[10px] border border-gray-200 overflow-hidden bg-white'},
      h('div',{className:'overflow-x-auto'},
        h('table',{className:'w-full text-sm'},
          h('thead',{className:'bg-zinc-50 border-b border-gray-100'},
            h('tr',null,['Status','Case','Output','Started','Duration','Triggered by'].map(c=>
              h('th',{key:c,className:'text-left px-3 py-2 font-medium text-zinc-400 text-[10px] uppercase tracking-[0.08em] whitespace-nowrap'},c)))),
          h('tbody',null,
            filtered.length===0
              ?h('tr',null,h('td',{colSpan:6,className:'px-3 py-12 text-center text-sm text-zinc-400'},'No runs to show'))
              :filtered.map(r=>h('tr',{key:r.id,onClick:()=>setSelectedRunId(r.id),className:'border-b border-gray-50 last:border-0 hover:bg-zinc-50/50 cursor-pointer'},
                  h('td',{className:'px-3 py-2.5 whitespace-nowrap'},h(StatusPill,{status:r.status})),
                  h('td',{className:'px-3 py-2.5 whitespace-nowrap'},h(CasePill,{caseId:r.case})),
                  h('td',{className:'px-3 py-2.5'},h(OutputCell,{output:r.output,status:r.status})),
                  h('td',{className:'px-3 py-2.5 text-zinc-500 text-xs whitespace-nowrap'},r.started),
                  h('td',{className:'px-3 py-2.5 text-zinc-700 text-xs tabular-nums whitespace-nowrap'},r.duration||'—'),
                  h('td',{className:'px-3 py-2.5 whitespace-nowrap'},
                    h('div',{className:'flex items-center gap-1.5'},
                      h(Avatar,{name:r.by.name,color:r.by.color}),
                      h('span',{className:'text-xs text-zinc-700'},r.by.name)))))))))
    ,
    h('div',{className:'flex items-center justify-between mt-2 text-[11px] text-zinc-400'},
      h('span',null,`Showing ${filtered.length} of ${runs.length} run${runs.length!==1?'s':''}`),
      h('span',{className:'flex items-center gap-1.5'},
        h('span',{className:'w-1.5 h-1.5 rounded-full bg-green-500'}),'Live · 10s auto-refresh')));
}

function AIAgentCard({ def, onClick }) {
  const Ico=IC[def.icon]||IC.Bot;
  return h('div',{onClick,className:'group bg-white rounded-[10px] border border-gray-200 p-5 cursor-pointer hover:border-blue-300 hover:shadow-sm transition-all flex flex-col'},
    h('div',{className:`w-9 h-9 rounded-lg flex items-center justify-center border ${def.iconBg} ${def.iconBd} ${def.iconTx} mb-3`},h(Ico)),
    h('p',{className:'text-sm font-semibold text-zinc-900 group-hover:text-blue-800 transition-colors mb-1.5'},def.label+' Agent'),
    h('p',{className:'text-xs text-zinc-500 leading-relaxed mb-4 flex-1'},def.description),
    h('div',{className:'flex items-center gap-2 text-xs'},
      h('span',{className:`inline-flex items-center px-2 py-0.5 rounded-full border text-[10px] font-medium ${def.status==='active'?'bg-green-50 text-green-700 border-green-200':'bg-zinc-100 text-zinc-500 border-zinc-200'}`},
        def.status==='active'?'Active':'Paused'),
      def.runCount!=null&&h('span',{className:'text-zinc-400'},`${def.runCount} ${def.runUnit||'runs'} this month`)));
}

function AIAgentsListPage(){
  const [selectedId,setSelectedId]=useState(null);
  if(selectedId){
    return h('div',{className:'space-y-4'},
      h('button',{onClick:()=>setSelectedId(null),className:'flex items-center gap-1.5 text-sm text-zinc-500 hover:text-zinc-900 transition-colors'},h(IC.Back),'All agents'),
      h(AgentConfigPage,{agentId:selectedId,key:selectedId}));
  }
  return h('div',null,
    h('div',{className:'flex items-start justify-between mb-6'},
      h('div',null,
        h('h1',{className:'text-xl font-semibold text-zinc-900'},'AI Agents'),
        h('p',{className:'text-sm text-zinc-500 mt-0.5'},'Specialized agents that handle a single task')),
      h(Btn,{variant:'primary'},h(IC.Plus),'New Agent')),
    h('div',{className:'grid grid-cols-2 lg:grid-cols-4 gap-4'},
      AGENT_DEFS.map(d=>h(AIAgentCard,{key:d.id,def:d,onClick:()=>setSelectedId(d.id)}))));
}

function AgentConfigPage({ agentId }) {
  const def=AGENT_BY_ID[agentId];
  if(!def) return h('div',null,'Unknown agent');
  const [name,setName]=useState(def.defaultIdentity?.name||def.label);
  const [voice,setVoice]=useState(def.defaultIdentity?.voice||'female');
  const [greeting,setGreeting]=useState(def.defaultIdentity?.greeting||'');
  const [prompt,setPrompt]=useState(def.defaultPrompt||'');
  const [active,setActive]=useState(true);
  const [saved,setSaved]=useState(false);
  const [tab,setTab]=useState('editor');
  const save=()=>{ setSaved(true);setTimeout(()=>setSaved(false),2000); };
  const Ico=IC[def.icon]||IC.Bot;

  return h('div',{className:'space-y-6'},
    /* Header */
    h('div',{className:'flex items-start gap-4'},
      h('div',{className:`w-11 h-11 rounded-lg flex items-center justify-center shrink-0 border ${def.iconBg} ${def.iconBd} ${def.iconTx}`},h(Ico)),
      h('div',{className:'flex-1 min-w-0'},
        h('h1',{className:'text-xl font-semibold text-zinc-900'},def.label+' Agent'),
        h('p',{className:'text-sm text-zinc-500 mt-0.5'},def.description)),
      h('button',{onClick:()=>setActive(!active),
        className:`h-7 px-2.5 rounded-md border text-[11px] font-medium transition-colors shrink-0 ${active?'bg-green-50 text-green-700 border-green-200':'bg-zinc-100 text-zinc-500 border-zinc-200'}`},
        active?'Active':'Paused')),

    /* Tabs */
    h('div',{className:'border-b border-gray-200 -mt-2'},
      h('div',{className:'flex'},
        [{id:'editor',label:'Editor'},{id:'runs',label:'Runs',count:(AGENT_RUNS[agentId]||[]).length}].map(t=>
          h('button',{key:t.id,onClick:()=>setTab(t.id),
            className:`flex items-center gap-1.5 px-3 py-2 text-sm font-medium border-b-2 -mb-px transition-colors ${tab===t.id?'border-blue-700 text-blue-700':'border-transparent text-zinc-500 hover:text-zinc-800'}`},
            t.label,
            t.count!=null&&h('span',{className:`text-[10px] font-semibold rounded-full px-1.5 py-px ${tab===t.id?'bg-blue-100 text-blue-700':'bg-zinc-100 text-zinc-500'}`},t.count))))),

    /* Editor tab */
    tab==='editor'&&h('div',{className:'space-y-6 max-w-2xl'},
      h(SectionCard,{title:'Agent Identity',sub:'How the agent introduces itself to callers'},
        h('div',{className:'space-y-4'},
          h('div',{className:'grid grid-cols-2 gap-4'},
            h('div',null,
              h(FLabel,{sub:'The name the agent uses when greeting callers'},'Agent name'),
              h(Input,{value:name,onChange:setName,placeholder:def.label})),
            h('div',null,
              h(FLabel,{sub:'Voice used for all languages unless overridden'},'Default voice'),
              h(FSel,{value:voice,onChange:setVoice,options:[{value:'female',label:'Female'},{value:'male',label:'Male'}]}))),
          h('div',null,
            h(FLabel,{sub:'First thing the agent says when a caller connects'},'Greeting script'),
            h(Textarea,{value:greeting,onChange:setGreeting,rows:3,placeholder:`Hi, I'm ${name||def.label}…`}),
            h('p',{className:'text-[10px] text-zinc-400 mt-1.5'},'Use {client_name} to personalise the greeting if the caller is already in your CRM.')))),
      h(SectionCard,{title:'System Prompt',sub:'The instructions that define this agent\'s behaviour'},
        h('div',{className:'space-y-2'},
          h(Textarea,{value:prompt,onChange:setPrompt,rows:10,placeholder:'Describe what this agent should do…'}),
          h('div',{className:'flex items-center justify-between text-[10px] text-zinc-400'},
            h('span',null,prompt.length+' characters'),
            h('button',{onClick:()=>setPrompt(def.defaultPrompt||''),className:'hover:text-blue-700 transition-colors'},'Reset to default')))),
      h('div',{className:'flex justify-end'},
        h(Btn,{onClick:save,variant:'primary',className:saved?'bg-emerald-600 border-emerald-600':''},
          saved?h(IC.Check):null,saved?'Saved':'Save Changes'))),

    /* Runs tab */
    tab==='runs'&&h(RunsTab,{agentId}));
}

/* ════════ SIDEBAR ══════════════════════════════════ */
const NAV_SECTIONS=[
  {section:'Account',items:[{id:'acct-general',label:'General',icon:'Settings'}]},
  {section:'Organisation',items:[
    {id:'org-general',label:'General',icon:'Settings'},
    {id:'team',label:'Team Members',icon:'Users'},
    {id:'fileflow',label:'FileFlow Inbox',icon:'Inbox'},
    {id:'lithub',label:'Lithub',icon:'Scale'},
    {id:'api-keys',label:'API Keys',icon:'Key'},
    {id:'sharing',label:'Sharing',icon:'Share'},
  ]},
  {section:'Agents',items:[
    {id:'voice-agent',label:'Voice',icon:'Phone'},
    {id:'ai-agents',label:'Agents',icon:'Bot'},
    {id:'agent-workflows',label:'Workflows',icon:'Zap'},
  ]},
];
const BREADCRUMBS={'acct-general':['Settings','General'],'org-general':['Settings','General'],'team':['Settings','Team Members'],'fileflow':['Settings','FileFlow Inbox'],'lithub':['Settings','Lithub'],'api-keys':['Settings','API Keys'],'sharing':['Settings','Sharing'],'voice-agent':['Settings','Voice'],'ai-agents':['Settings','Agents'],'agent-workflows':['Settings','Workflows']};

function Sidebar({ active,setActive }) {
  return h('aside',{className:'w-48 shrink-0 border-r border-gray-200 bg-white flex flex-col h-full overflow-y-auto'},
    h('a',{href:'#',className:'flex items-center gap-2 px-4 py-4 text-sm font-medium text-zinc-700 hover:text-zinc-900 border-b border-gray-100 transition-colors shrink-0'},h(IC.Back),'Back to app'),
    h('nav',{className:'flex-1 py-3'},NAV_SECTIONS.map(sec=>
      h('div',{key:sec.section,className:'mb-5'},
        h('p',{className:'px-4 mb-1 text-[10px] font-semibold uppercase tracking-[0.08em] text-zinc-400'},sec.section),
        sec.items.map(item=>{
          const IcoComp=IC[item.icon]; const isActive=item.id===active;
          return h('button',{key:item.id,onClick:()=>setActive(item.id),
            className:`w-full flex items-center gap-2.5 px-4 py-2 text-sm text-left transition-colors ${isActive?'bg-blue-50 text-blue-800 font-medium':'text-zinc-600 hover:bg-zinc-50 hover:text-zinc-900'}`},
            IcoComp&&h(IcoComp),item.label);
        })))));
}

/* ════════ ROOT ═════════════════════════════════════ */
function App() {
  const [nav,setNav]=useState('voice-agent');
  const crumbs=BREADCRUMBS[nav]||['Settings'];
  const renderPage=()=>{
    switch(nav){
      case 'org-general':  return h(OrgGeneralPage,null);
      case 'fileflow':     return h(FileFlowInboxPage,null);
      case 'voice-agent':  return h(VoiceAgentPage,null);
      case 'ai-agents':    return h(AIAgentsListPage,null);
      case 'agent-workflows': return h(AgentWorkflowsPage,null);
      default:
        return h('div',null,
          h('h1',{className:'text-xl font-semibold text-zinc-900 mb-6'},crumbs[crumbs.length-1]),
          h('div',{className:'rounded-[10px] border border-dashed border-gray-200 bg-zinc-50 p-12 text-center'},h('p',{className:'text-sm text-zinc-400'},crumbs[crumbs.length-1]+' — coming soon')));
    }
  };
  return h('div',{className:'flex h-screen bg-white'},
    h(Sidebar,{active:nav,setActive:setNav}),
    h('div',{className:'flex-1 min-w-0 overflow-auto bg-white'},
      h('div',{className:'max-w-[860px] mx-auto px-8 py-8'},
        h('div',{className:'flex items-center gap-1.5 text-sm text-zinc-500 mb-6'},crumbs.map((c,i)=>
          h('span',{key:c,className:'flex items-center gap-1.5'},i>0&&h('span',{className:'text-zinc-300'},'›'),h('span',{className:i===crumbs.length-1?'text-zinc-900 font-medium':''},c)))),
        renderPage())));
}
ReactDOM.render(h(App,null),document.getElementById('root'));
</script>
</body>
</html>
